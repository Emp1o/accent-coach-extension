<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Карточки — ОрфоДракон</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="dragon-v3.css" />
  </head>
  <body>
    <main class="container wide">
      <section class="hero-card slim">
        <div>
          <p class="eyebrow">Библиотека карточек</p>
          <h1>Все карточки</h1>
          <p class="hero-copy">Здесь собраны слова и предложения для повторения.</p>
        </div>
        <a class="pill-link" href="popup.html" target="_blank">Открыть тренажёр</a>
      </section>
      <section class="panel">
        <div class="actions compact">
          <input id="cardsSearch" type="text" placeholder="Поиск по карточкам" />
          <button id="startTrainingBtn" class="primary">🚀 Начать тренировку</button>
          <button id="startEgeExamFromCardsBtn" class="secondary">📝 ЕГЭ-режим</button>
          <button id="reviewWeakBtn" class="secondary">Слабые места недели</button>
          <select id="trainingCountSelect"><option value="5">5 карточек</option><option value="10" selected>10 карточек</option><option value="15">15 карточек</option><option value="20">20 карточек</option></select>
        </div>
        <div id="cardsList"></div>
      </section>
    </main>
    <script src="cards.js"></script>
      <script src="dragon-ui.js"></script>
  </body>
</html>
