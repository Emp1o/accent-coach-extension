<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ЕГЭ-режим — ОрфоДракон</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="dragon-v3.css" />
  </head>
  <body>
    <main class="container wide">
      <section class="hero-card slim">
        <div>
          <p class="eyebrow">Экзаменационный режим</p>
          <h1>ЕГЭ PRO</h1>
          <p class="hero-copy">Строгий режим: таймер, одна попытка, итоговая оценка и анализ слабых тем.</p>
        </div>
        <a class="pill-link" href="popup.html" target="_blank">Открыть тренажёр</a>
      </section>

      <section id="egeExamBossArena" class="training-boss-arena boss-mixed">
        <div id="egeExamBossVisual" class="training-boss-visual boss-mixed" aria-hidden="true"></div>
        <div class="training-boss-info">
          <div class="panel-header compact">
            <h2 id="egeExamBossTitle">Босс ЕГЭ</h2>
          </div>
          <div class="boss-health-bar"><div id="egeExamBossHpBar" class="boss-health-fill"></div></div>
          <p id="egeExamBossHpText" class="mini-help">HP: —</p>
        </div>
      </section>

      <section class="panel ege-toolbar">
        <div class="ege-timer-box">
          <span class="badge">таймер</span>
          <strong id="egeTimer">10:00</strong>
        </div>
        <div class="ege-timer-box">
          <span class="badge">режим</span>
          <strong>1 попытка</strong>
        </div>
        <div class="ege-timer-box">
          <span class="badge">заданий</span>
          <strong id="egeMeta">0</strong>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Экзаменационный вариант</h2>
          <span class="badge">как в тестах</span>
        </div>
        <form id="egeForm"></form>
        <div class="actions compact">
          <button id="submitEgeExamBtn" class="primary" type="button">Завершить экзамен</button>
        </div>
      </section>

    </main>
    <script src="ege_exam.js"></script>
      <script src="dragon-ui.js"></script>
  </body>
</html>
