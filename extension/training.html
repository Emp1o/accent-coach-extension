<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Тренировка — Accent Coach</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container wide training-shell">
      <section class="hero-card slim">
        <div>
          <p class="eyebrow">Duolingo-style тренировка</p>
          <h1>Тренировка карточек</h1>
          <p class="hero-copy">Открывай карточки по одной, переворачивай ответ и отмечай: помню или не помню.</p>
        </div>
        <a class="pill-link" href="cards.html" target="_blank">Все карточки</a>
      </section>

      <section class="panel training-topbar">
        <div class="progress-line-wrap">
          <div id="trainingProgressBar" class="progress-line"></div>
        </div>
        <div class="training-stats">
          <span id="trainingCounter">0 / 0</span>
          <span id="trainingModeLabel" class="badge">все карточки</span>
          <span id="trainingXp" class="badge">XP: 0</span>
        </div>
      </section>

      <section class="training-card-wrap">
        <article id="trainingCard" class="training-card">
          <div class="training-side training-front">
            <div id="trainingQuestionLabel" class="training-label">Задание</div>
            <div id="trainingQuestion" class="training-question">Загрузка...</div>
          </div>
          <div class="training-side training-back hidden">
            <div class="training-label">Ответ</div>
            <div id="trainingAnswer" class="training-answer"></div>
            <div id="trainingRule" class="muted training-rule"></div>
          </div>
        </article>

        <div class="training-actions">
          <button id="showAnswerBtn" class="primary">Показать ответ</button>
          <div id="gradeActions" class="row hidden">
            <button id="forgetBtn" class="danger">❌ Не помню</button>
            <button id="rememberBtn" class="success">✅ Помню</button>
          </div>
        </div>
      </section>

      <section id="trainingSummary" class="panel hidden">
        <div class="panel-header">
          <h2>Итог сессии</h2>
          <span class="badge">результат</span>
        </div>
        <div id="trainingSummaryText" class="muted"></div>
        <div class="actions compact">
          <button id="restartTrainingBtn" class="primary">Пройти ещё раз</button>
          <a href="cards.html" target="_blank"><button class="secondary">Вернуться к карточкам</button></a>
        </div>
      </section>
    </main>
    <script src="training.js"></script>
  </body>
</html>
